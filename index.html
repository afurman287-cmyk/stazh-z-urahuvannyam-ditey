<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>З 1 квітня!</title>
  <style>
    :root {
      --bg1: #fff7fb;
      --bg2: #eef7ff;
      --text: #1f2a44;
      --accent: #ff4d6d;
      --accent2: #ffb703;
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top, var(--bg1), var(--bg2));
      color: var(--text);
      text-align: center;
      position: relative;
    }

    .card {
      position: relative;
      z-index: 2;
      background: rgba(255,255,255,0.8);
      backdrop-filter: blur(8px);
      border-radius: 28px;
      padding: 32px 24px;
      width: min(90vw, 760px);
      box-shadow: 0 18px 60px rgba(0,0,0,0.12);
      border: 1px solid rgba(255,255,255,0.8);
      animation: popIn 0.9s ease-out;
    }

    .badge {
      display: inline-block;
      padding: 10px 16px;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--accent), #ff7aa2);
      color: white;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.04em;
      margin-bottom: 18px;
      box-shadow: 0 8px 24px rgba(255,77,109,0.28);
      animation: float 2.8s ease-in-out infinite;
    }

    h1 {
      margin: 0;
      font-size: clamp(42px, 8vw, 88px);
      line-height: 1.05;
      color: var(--accent);
      text-shadow: 0 4px 14px rgba(255,77,109,0.18);
    }

    p {
      margin: 18px 0 0;
      font-size: clamp(22px, 3.6vw, 38px);
      line-height: 1.3;
      font-weight: 700;
    }

    .smile {
      display: inline-block;
      animation: wiggle 1.7s ease-in-out infinite;
    }

    .hint {
      margin-top: 18px;
      font-size: 14px;
      font-weight: 600;
      opacity: 0.65;
    }

    .burst {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 1;
    }

    .emoji {
      position: absolute;
      font-size: clamp(18px, 2vw, 28px);
      animation: fall linear forwards;
      will-change: transform, opacity;
    }

    .firework {
      position: absolute;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      box-shadow:
        0 -60px 0 0 currentColor,
        42px -42px 0 0 currentColor,
        60px 0 0 0 currentColor,
        42px 42px 0 0 currentColor,
        0 60px 0 0 currentColor,
        -42px 42px 0 0 currentColor,
        -60px 0 0 0 currentColor,
        -42px -42px 0 0 currentColor;
      animation: explode 1.4s ease-out forwards;
      opacity: 0;
    }

    @keyframes popIn {
      from { opacity: 0; transform: translateY(18px) scale(0.96); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }

    @keyframes wiggle {
      0%, 100% { transform: rotate(0deg) scale(1); }
      25% { transform: rotate(-10deg) scale(1.05); }
      75% { transform: rotate(10deg) scale(1.05); }
    }

    @keyframes fall {
      0% {
        transform: translateY(-10vh) rotate(0deg);
        opacity: 0;
      }
      10% { opacity: 1; }
      100% {
        transform: translateY(110vh) rotate(540deg);
        opacity: 0.9;
      }
    }

    @keyframes explode {
      0% { transform: scale(0.2); opacity: 0; }
      15% { opacity: 1; }
      100% { transform: scale(1.2); opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="burst" id="burst"></div>

  <main class="card">
    <div class="badge">🎉 Святковий настрій 🎉</div>
    <h1>З 1 квітня!</h1>
    <p>Посміхніться <span class="smile">:)</span></p>
    <div class="hint">Нехай день буде легким, веселим і добрим ✨</div>
  </main>

  <script>
    const burst = document.getElementById('burst');
    const confettiIcons = ['🎉','🎊','✨','💛','💙','🌟','🥳'];
    const colors = ['#ff4d6d', '#ffb703', '#7b2cbf', '#3a86ff', '#06d6a0', '#fb5607'];

    function createConfettiPiece() {
      const el = document.createElement('div');
      el.className = 'emoji';
      el.textContent = confettiIcons[Math.floor(Math.random() * confettiIcons.length)];
      el.style.left = Math.random() * 100 + 'vw';
      el.style.animationDuration = (4 + Math.random() * 4) + 's';
      el.style.animationDelay = (Math.random() * 1.5) + 's';
      burst.appendChild(el);
      setTimeout(() => el.remove(), 8500);
    }

    function rainConfetti(count = 40) {
      for (let i = 0; i < count; i++) {
        setTimeout(createConfettiPiece, i * 120);
      }
    }

    function firework(x, y, color) {
      const fw = document.createElement('div');
      fw.className = 'firework';
      fw.style.left = x + 'vw';
      fw.style.top = y + 'vh';
      fw.style.color = color;
      burst.appendChild(fw);
      setTimeout(() => fw.remove(), 1500);
    }

    function launchFireworks() {
      const points = [
        [18, 24], [50, 18], [82, 28], [30, 48], [72, 50]
      ];
      points.forEach((p, i) => {
        setTimeout(() => {
          firework(p[0], p[1], colors[i % colors.length]);
        }, i * 280);
      });
    }

    rainConfetti(55);
    launchFireworks();

    setInterval(() => rainConfetti(18), 5000);
    setInterval(launchFireworks, 4200);

    document.body.addEventListener('click', (e) => {
      const x = (e.clientX / window.innerWidth) * 100;
      const y = (e.clientY / window.innerHeight) * 100;
      firework(x, y, colors[Math.floor(Math.random() * colors.length)]);
      rainConfetti(10);
    });
  </script>
</body>
</html>
